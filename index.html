<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portobello America | Box Selector</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --portobello-blue: #002554;
      --portobello-gray: #4f5159;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Roboto, Arial, sans-serif;
      background-color: #f8f9fa;
      color: var(--portobello-gray);
    }

    h1 {
      color: var(--portobello-blue);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    select, button {
      border-radius: 0.5rem;
    }

    .brand-header {
      background-color: var(--portobello-blue);
      color: white;
    }

    .btn-portobello {
      background-color: var(--portobello-blue);
      color: white;
      transition: background-color 0.3s ease;
    }

    .btn-portobello:hover {
      background-color: #1b3c6d;
      color: #fff;
    }

    .card {
      border: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      border-radius: 1rem;
    }

    #renderArea img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

  </style>
</head>

<body class="min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="brand-header py-4 text-center shadow-sm">
    <h1 class="text-3xl font-light tracking-wide">Portobello America Box Selector</h1>
    <p class="text-gray-200 text-sm">Pick List</p>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container my-5 flex-grow">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      
      <!-- LEFT SIDE: Box Selector -->
      <div class="card p-5">
        <h2 class="text-xl font-medium mb-4">Select Your Box</h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
          <div>
            <label for="boxType" class="form-label font-semibold text-gray-700">Box Type</label>
            <select id="boxType" class="form-select border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-700">
              <option value="">-- Select a box type --</option>
            </select>
          </div>

          <div>
            <label for="boxSize" class="form-label font-semibold text-gray-700">Size</label>
            <select id="boxSize" class="form-select border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-700">
              <option value="">-- Select a size --</option>
            </select>
          </div>

          <div class="mt-3 md:mt-0">
            <button id="addBtn" class="btn btn-portobello w-full py-2 shadow-md">Add to List</button>
          </div>
        </div>

        <hr class="my-5">

        <h3 class="text-lg font-semibold mb-3 text-gray-800">Selected Items</h3>
        <ul id="selectedList" class="list-group"></ul>
      </div>

      <!-- RIGHT SIDE: Render Area -->
      <div class="card p-5 flex items-center justify-center bg-white", style="height: 400px;">
        <div id="renderArea" class="w-full h-80 border-2 border-dashed border-gray-300 flex items-center justify-center text-gray-400">
          <img src="placeholder.png" alt="">
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gray-100 py-4 text-center text-sm text-gray-500 border-t">
    &copy; 2025 Portobello America · Designed with purpose and simplicity
  </footer>

  <script>
    const selectedArray = []
    fetch('db.json')
        .then(response => response.json())
        .then(data => {
        const boxTypeSelect = document.getElementById('boxType');
        const boxSizeSelect = document.getElementById('boxSize');
        const addBtn = document.getElementById('addBtn');
        const selectedList = document.getElementById('selectedList');

        for (const type in data.boxes) {
            const option = document.createElement('option');
            option.value = type;
            option.textContent = type;
            boxTypeSelect.appendChild(option);
        }

        boxTypeSelect.addEventListener('change', () => {
            boxSizeSelect.innerHTML = '<option value="">-- Select a size --</option>';
            const selectedType = boxTypeSelect.value;
            if (!selectedType) return;

            const sizes = data.boxes[selectedType];
            for (const size in sizes) {
            const option = document.createElement('option');
            option.value = size;
            option.textContent = size;
            boxSizeSelect.appendChild(option);
            }
        });

        addBtn.addEventListener('click', () => {
            const type = boxTypeSelect.value;
            const size = boxSizeSelect.value;
            if (!type || !size) return alert('Please select both box type and size.');

            const listItem = document.createElement('li');
            listItem.className = 'list-group-item flex justify-between items-center';
            listItem.innerHTML = `
            <span>${type} - ${size}</span>
            <button class="text-red-600 font-bold hover:text-red-800 ml-4 remove-btn">X</button>
            `;

            listItem.querySelector('.remove-btn').addEventListener('click', () => {
            listItem.remove();

            });

            selectedList.appendChild(listItem);
        });
        })
        .catch(error => console.error('Error loading JSON:', error));
  </script>

</body>
</html>
